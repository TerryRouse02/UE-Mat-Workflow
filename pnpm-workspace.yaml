packages:
  - 'viewer'
  - 'viewer/web'
# Allow esbuild's postinstall to fetch its platform binary. vite (build) and
# vitest (tests) both need it; without this, pnpm blocks the build script and
# `pnpm install` fails non-interactively in CI. Both keys are intentional:
# `onlyBuiltDependencies` is the standard pnpm setting (used by GitHub CI's
# pnpm); `allowBuilds` is what this managed dev environment's pnpm reads.
onlyBuiltDependencies:
  - esbuild
allowBuilds:
  esbuild: true
