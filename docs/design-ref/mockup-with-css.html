<style>/* =========================================================================
   UE Material Workflow — styles
   Base tokens + layout + components, themed by .dir-a / .dir-b / .dir-c
   ========================================================================= */

* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  background: var(--bg-app);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
:root {
  --font-sans: "Inter", -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "SF Mono", "Roboto Mono", ui-monospace, Menlo, monospace;
  --ok: #4ec46e; --warn: #e0a64e; --error: #e0594e; --info: #4ea0d6;
  /* Theme — UE Native (locked) */
  --bg-app:#1a1d23; --bg-panel:#21252e; --bg-panel-2:#1c2028; --bg-canvas:#16181d;
  --bg-elev:#272c37; --border:#2d323e; --border-strong:#3a4150; --hairline:#262b34;
  --text:#dde2ea; --text-dim:#99a2b1; --text-mute:#69707d;
  --accent:#2dd4bf; --accent-dim:#1d8c80; --accent-ghost:rgba(45,212,191,.13);
  --node-bg:#262b35; --node-bg-2:#222732; --node-head:#2c323d; --node-border:#373e4b; --node-radius:6px;
  --node-sel:#2dd4bf; --panel-radius:7px; --chip-radius:5px;
  --grid:rgba(255,255,255,.045); --scroll:#3a414e; --scroll-h:#4a5260;
}
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: var(--scroll-h); background-clip: padding-box; }
::-webkit-scrollbar-track { background: transparent; }

/* ========================= App shell ========================= */
#root { height: 100%; }
.app { display: flex; flex-direction: column; height: 100%; color: var(--text); }

/* prototype meta-bar (clearly a demo affordance) */
.metabar {
  display:flex; align-items:center; gap:10px; height:34px; flex:0 0 34px;
  padding:0 12px; background:#000; border-bottom:1px solid var(--border);
  font-size:11px; color:var(--text-mute); user-select:none; white-space:nowrap; flex-wrap:nowrap; overflow-x:auto; overflow-y:hidden;
}
.metabar::-webkit-scrollbar { height:0; }
.metabar > * { flex:0 0 auto; }
.metabar .mb-brand { color:var(--text-dim); font-weight:600; letter-spacing:.02em; }
.metabar .mb-brand b { color:var(--accent); }
.metabar .seg { display:flex; background:var(--bg-panel-2); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
.metabar .seg button { background:transparent; border:0; color:var(--text-dim); font:inherit; padding:3px 10px; cursor:pointer; }
.metabar .seg button.on { background:var(--accent); color:#04110f; font-weight:600; }
.metabar .mb-label { text-transform:uppercase; letter-spacing:.08em; font-size:9.5px; color:var(--text-mute); }
.metabar .mb-states { display:flex; gap:6px; margin-left:auto; align-items:center; }
.metabar .mb-states button { background:var(--bg-panel-2); border:1px solid var(--border); color:var(--text-dim); border-radius:5px; padding:3px 9px; font:inherit; cursor:pointer; }
.metabar .mb-states button:hover { border-color:var(--border-strong); color:var(--text); }
.metabar .mb-states button.on { border-color:var(--accent-dim); color:var(--accent); }

/* app chrome (the real toolbar) */
.chrome {
  display:flex; align-items:center; gap:12px; height:46px; flex:0 0 46px;
  padding:0 14px; background:var(--bg-panel); border-bottom:1px solid var(--border);
}
.chrome .logo { display:flex; align-items:center; gap:9px; }
.chrome .logo .mark { width:22px; height:22px; border-radius:5px; background:linear-gradient(140deg,var(--accent),var(--accent-dim)); display:grid; place-items:center; color:#04130f; font-weight:800; font-size:13px; }
.chrome .logo .t { font-weight:650; font-size:13.5px; letter-spacing:.01em; white-space:nowrap; }
.chrome .logo .ver { font-family:var(--font-mono); font-size:10px; color:var(--text-mute); border:1px solid var(--border); border-radius:4px; padding:1px 5px; white-space:nowrap; }
.chrome .proj { display:flex; align-items:center; gap:6px; padding:5px 9px; border:1px solid var(--border); border-radius:6px; background:var(--bg-panel-2); color:var(--text-dim); cursor:pointer; font-size:12px; }
.chrome .proj:hover { border-color:var(--border-strong); }
.chrome .bcrumb { font-size:12px; color:var(--text-mute); white-space:nowrap; }
.chrome .bcrumb b { color:var(--text-dim); font-weight:600; }
.chrome .bcrumb .sep { color:var(--text-mute); margin:0 2px; }
.chrome .more-wrap { position:relative; }
.chrome .menu { position:absolute; top:38px; right:0; z-index:50; min-width:212px; background:var(--bg-panel); border:1px solid var(--border-strong); border-radius:9px; box-shadow:0 16px 44px rgba(0,0,0,.5); padding:6px; }
.chrome .menu-label { font-size:9.5px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-mute); padding:6px 9px 4px; }
.chrome .menu-item { display:flex; align-items:center; gap:9px; width:100%; text-align:left; background:transparent; border:0; color:var(--text); font:inherit; font-size:12.5px; padding:8px 9px; border-radius:6px; cursor:pointer; }
.chrome .menu-item:hover { background:var(--bg-elev); }
.chrome .menu-item .mi-hint { margin-left:auto; font-family:var(--font-mono); font-size:10px; color:var(--text-mute); }
.chrome .menu-div { height:1px; background:var(--hairline); margin:5px 6px; }
.chrome .spacer { flex:1; }
.chrome .searchbtn { display:flex; align-items:center; gap:8px; min-width:240px; padding:6px 10px; background:var(--bg-panel-2); border:1px solid var(--border); border-radius:7px; color:var(--text-mute); cursor:text; font-size:12px; }
.chrome .searchbtn kbd { margin-left:auto; font-family:var(--font-mono); font-size:10px; background:var(--bg-elev); border:1px solid var(--border); border-radius:4px; padding:1px 5px; color:var(--text-dim); }
.chrome .conn { display:flex; align-items:center; gap:7px; font-size:11.5px; color:var(--text-dim); padding:5px 10px; border:1px solid var(--border); border-radius:6px; background:var(--bg-panel-2); white-space:nowrap; }
.chrome .conn .dot { width:7px; height:7px; border-radius:50%; }
.chrome .conn.live .dot { background:var(--ok); box-shadow:0 0 0 3px rgba(78,196,110,.16); }
.chrome .conn.offline .dot { background:var(--text-mute); }
.btn { display:inline-flex; align-items:center; gap:7px; padding:6px 12px; border-radius:7px; border:1px solid var(--border); background:var(--bg-panel-2); color:var(--text); font:inherit; font-size:12px; cursor:pointer; white-space:nowrap; }
.btn:hover { border-color:var(--border-strong); background:var(--bg-elev); }
.btn.primary { background:var(--accent); border-color:var(--accent); color:#04130f; font-weight:600; }
.btn.primary:hover { filter:brightness(1.06); }
.btn.ghost { background:transparent; }
.btn.sm { padding:4px 9px; font-size:11px; }
.btn:disabled { opacity:.45; cursor:not-allowed; }

/* banner */
.banner { display:flex; align-items:center; gap:10px; padding:8px 16px; font-size:12px; flex:0 0 auto; border-bottom:1px solid var(--border); }
.banner.warn { background:linear-gradient(0deg,var(--bg-app),var(--bg-app)),rgba(224,166,78,.14); background-blend-mode:normal; color:#f0cf94; border-bottom-color:rgba(224,166,78,.3); }
.banner.warn .ico { color:var(--warn); }
.banner.info { background:rgba(78,160,214,.1); color:#bfe0f5; border-bottom-color:rgba(78,160,214,.28); }
.banner .x { margin-left:auto; cursor:pointer; color:inherit; opacity:.7; background:none; border:0; font-size:14px; }

/* body grid */
.body { display:grid; grid-template-columns: var(--left,272px) 1fr var(--right,320px); flex:1; min-height:0; }
.panel { background:var(--bg-panel); min-height:0; display:flex; flex-direction:column; }
.panel.left { border-right:1px solid var(--border); }
.panel.right { border-left:1px solid var(--border); }
.panel-head { display:flex; align-items:center; gap:8px; padding:11px 13px; flex:0 0 auto; border-bottom:1px solid var(--hairline); }
.panel-head .h { font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--text-dim); }
.panel-head .count { font-family:var(--font-mono); font-size:10.5px; color:var(--text-mute); }
.panel-head .grow { flex:1; }
.iconbtn { width:26px; height:26px; display:grid; place-items:center; border-radius:6px; border:1px solid transparent; background:transparent; color:var(--text-dim); cursor:pointer; }
.iconbtn:hover { background:var(--bg-elev); color:var(--text); }

/* ===================== Files panel ===================== */
.files { overflow:auto; padding:6px; flex:1; }
.files-search { margin:4px 6px 8px; display:flex; align-items:center; gap:7px; padding:6px 9px; background:var(--bg-panel-2); border:1px solid var(--border); border-radius:6px; color:var(--text-mute); font-size:12px; }
.files-search input { all:unset; flex:1; color:var(--text); font-size:12px; }
.grp { margin:2px 0 10px; }
.grp-head { display:flex; align-items:center; gap:7px; padding:5px 8px; cursor:pointer; color:var(--text-dim); }
.grp-head .caret { transition:transform .12s; color:var(--text-mute); }
.grp-head.collapsed .caret { transform:rotate(-90deg); }
.grp-head .gt { font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; }
.grp-head .gc { margin-left:auto; font-family:var(--font-mono); font-size:10px; color:var(--text-mute); }
.sec-label { display:flex; align-items:center; gap:6px; padding:6px 10px 4px; font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--text-mute); }
.sec-label .badge { font-family:var(--font-mono); letter-spacing:0; text-transform:none; font-size:9.5px; padding:1px 6px; border-radius:10px; border:1px solid var(--border); color:var(--text-dim); }
.sec-crawled { background:repeating-linear-gradient(45deg,transparent,transparent 7px,var(--accent-ghost) 7px,var(--accent-ghost) 8px); border-radius:6px; }

.frow { display:flex; align-items:center; gap:9px; padding:7px 9px; border-radius:6px; cursor:pointer; position:relative; }
.frow:hover { background:var(--bg-elev); }
.frow.sel { background:var(--accent-ghost); box-shadow:inset 2px 0 0 var(--accent); }
.frow .tico { width:18px; height:18px; flex:0 0 18px; display:grid; place-items:center; color:var(--text-dim); }
.frow .nm { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:12.5px; }
.frow.ro .nm { color:var(--text-dim); }
.frow .meta { display:flex; align-items:center; gap:8px; flex:0 0 auto; }
.frow .nc { font-family:var(--font-mono); font-size:10.5px; color:var(--text-mute); }
.sdot { width:7px; height:7px; border-radius:50%; flex:0 0 7px; }
.sdot.ok { background:var(--ok); } .sdot.warn { background:var(--warn); } .sdot.error { background:var(--error); }
.bigmark { font-family:var(--font-mono); font-size:9px; font-weight:700; color:var(--warn); border:1px solid rgba(224,166,78,.4); border-radius:4px; padding:0 4px; line-height:14px; }
.usedby { font-family:var(--font-mono); font-size:9.5px; color:var(--text-mute); }

/* ===================== Canvas ===================== */
.canvas-wrap { position:relative; background:var(--bg-canvas); overflow:hidden; min-height:0; }
.grid-bg { position:absolute; inset:0; background-image:radial-gradient(var(--grid) 1px, transparent 1px); }
.viewport { position:absolute; inset:0; cursor:grab; }
.viewport.panning { cursor:grabbing; }
.scene { position:absolute; left:0; top:0; transform-origin:0 0; }

/* edges layer */
.edges { position:absolute; left:0; top:0; overflow:visible; pointer-events:none; }
.edge { fill:none; stroke-width:2; opacity:.85; }
.edge.dim { opacity:.18; }
.edge.hot { opacity:1; stroke-width:2.6; }

/* comment boxes */
.cbox { position:absolute; border-radius:8px; border:1.5px solid; pointer-events:none; }
.cbox .cbtitle { position:absolute; top:0; left:0; transform:translateY(-100%); font-size:11px; font-weight:600; padding:3px 9px; border-radius:6px 6px 0 0; color:#0c0f12; }

/* node — uniform dark panel; category shown only by a small header dot */
.node { position:absolute; background:var(--node-bg); border:1px solid var(--node-border); border-radius:var(--node-radius); box-shadow:0 1px 3px rgba(0,0,0,.35); font-size:11.5px; color:var(--text); }
.node.sel { border-color:var(--node-sel); box-shadow:0 0 0 1.5px var(--node-sel), 0 4px 16px rgba(0,0,0,.4); }
.node.flash { animation:flash 1.1s ease; }
@keyframes flash { 0%,100%{box-shadow:0 1px 3px rgba(0,0,0,.35);} 30%,60%{box-shadow:0 0 0 3px var(--accent),0 0 22px var(--accent);} }
.node .nhead { display:flex; align-items:center; gap:7px; padding:6px 9px; border-radius:var(--node-radius) var(--node-radius) 0 0; background:var(--node-head); border-bottom:1px solid var(--hairline); color:var(--text); }
.node .nhead .ndot { width:7px; height:7px; border-radius:50%; flex:0 0 7px; background:var(--cat); box-shadow:0 0 0 2px color-mix(in srgb, var(--cat) 22%, transparent); }
.node .nhead .ntitle { font-weight:600; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.node .nhead .nsub { font-size:9.5px; color:var(--text-mute); margin-left:auto; white-space:nowrap; font-family:var(--font-mono); }

.node .nbody { padding:5px 0; display:flex; flex-direction:column; gap:2px; }
.node .prow { display:flex; align-items:center; min-height:16px; }
.node .prow.inp { justify-content:flex-start; }
.node .prow.outp { justify-content:flex-end; text-align:right; }
.pin { width:8px; height:8px; flex:0 0 8px; opacity:.92; }
.pin.tri { width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:7px solid var(--pc); opacity:1; }
.pin.dot { border-radius:50%; background:var(--pc); }
.prow.inp .pin { margin-left:-5px; margin-right:6px; }
.prow.outp .pin { margin-right:-5px; margin-left:6px; }
.prow .plabel { color:var(--text-dim); white-space:nowrap; font-size:10.5px; }
.prow.outp .plabel { color:var(--text-dim); }

/* canvas controls */
.canvas-ctl { position:absolute; left:12px; bottom:12px; display:flex; flex-direction:column; gap:6px; }
.canvas-ctl button { width:30px; height:30px; display:grid; place-items:center; background:var(--bg-panel); border:1px solid var(--border); border-radius:7px; color:var(--text-dim); cursor:pointer; }
.canvas-ctl button:hover { color:var(--text); border-color:var(--border-strong); }
.zoom-ind { position:absolute; left:12px; top:12px; font-family:var(--font-mono); font-size:10.5px; color:var(--text-mute); background:var(--bg-panel); border:1px solid var(--border); border-radius:6px; padding:3px 8px; }
.legend { position:absolute; right:12px; top:12px; display:flex; gap:10px; flex-wrap:wrap; max-width:300px; justify-content:flex-end; background:var(--bg-panel); border:1px solid var(--border); border-radius:7px; padding:6px 9px; }
.legend .lg { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--text-dim); }
.legend .lg i { width:9px; height:9px; border-radius:50%; }

/* minimap */
.minimap { position:absolute; right:12px; bottom:12px; width:188px; height:120px; background:var(--bg-panel); border:1px solid var(--border); border-radius:7px; overflow:hidden; }
.minimap .mm-node { position:absolute; border-radius:1px; }
.minimap .mm-view { position:absolute; border:1.5px solid var(--accent); background:var(--accent-ghost); border-radius:2px; }
.minimap .mm-head { position:absolute; top:0; left:0; right:0; font-size:9px; padding:2px 6px; color:var(--text-mute); background:linear-gradient(var(--bg-panel),transparent); z-index:2; text-transform:uppercase; letter-spacing:.06em; }

/* big-graph overlay (replaces canvas content) */
.canvas-msg { position:absolute; inset:0; display:grid; place-items:center; padding:40px; }
.canvas-msg .card { max-width:440px; text-align:center; }
.canvas-msg .big-ico { width:54px; height:54px; margin:0 auto 16px; border-radius:13px; display:grid; place-items:center; }
.canvas-msg h2 { font-size:17px; margin:0 0 8px; }
.canvas-msg p { color:var(--text-dim); margin:0 0 8px; font-size:12.5px; }
.canvas-msg .stat { display:flex; gap:18px; justify-content:center; margin:18px 0 22px; }
.canvas-msg .stat .s { }
.canvas-msg .stat .s .v { font-family:var(--font-mono); font-size:20px; font-weight:700; }
.canvas-msg .stat .s .l { font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-mute); }
.canvas-msg .actions { display:flex; gap:10px; justify-content:center; }

/* ===================== Inspector ===================== */
.insp { overflow:auto; flex:1; min-height:0; }
.insp-mode { display:flex; gap:4px; padding:8px 10px; border-bottom:1px solid var(--hairline); }
.insp-mode .tab { flex:1; text-align:center; padding:5px; border-radius:6px; font-size:11px; color:var(--text-dim); cursor:pointer; border:1px solid transparent; }
.insp-mode .tab.on { background:var(--bg-elev); color:var(--text); border-color:var(--border); }

.isec { padding:12px 14px; border-bottom:1px solid var(--hairline); }
.isec .lbl { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-mute); margin-bottom:8px; white-space:nowrap; }
.node-title { display:flex; align-items:center; gap:9px; }
.node-title .swatch { width:11px; height:24px; border-radius:3px; }
.node-title .nt { font-size:15px; font-weight:650; }
.node-title .ntsub { font-family:var(--font-mono); font-size:10.5px; color:var(--text-mute); }
.kv { display:grid; grid-template-columns:auto 1fr; gap:3px 14px; padding:4px 0; font-size:12px; align-items:baseline; }
.kv .k { color:var(--text-dim); } .kv .v { font-family:var(--font-mono); color:var(--text); text-align:right; word-break:break-word; }

.pinlist { display:flex; flex-direction:column; gap:5px; }
.pinrow { display:flex; align-items:center; gap:9px; padding:5px 8px; background:var(--bg-panel-2); border:1px solid var(--border); border-radius:6px; }
.pinrow .pc { width:10px; height:10px; border-radius:50%; flex:0 0 10px; }
.pinrow .pn { font-size:12px; flex:1; }
.pinrow .pt { font-family:var(--font-mono); font-size:10px; color:var(--text-dim); padding:1px 6px; border:1px solid var(--border); border-radius:10px; }

.codeblock { font-family:var(--font-mono); font-size:11px; background:var(--bg-canvas); border:1px solid var(--border); border-radius:6px; padding:9px 11px; color:var(--accent); white-space:pre-wrap; word-break:break-all; line-height:1.5; }

/* metadata / freshness chips */
.fresh { display:inline-flex; align-items:center; gap:5px; font-size:10.5px; padding:2px 8px; border-radius:11px; font-family:var(--font-mono); }
.fresh.fresh-fresh { color:var(--ok); background:rgba(78,196,110,.12); }
.fresh.fresh-stale { color:var(--warn); background:rgba(224,166,78,.13); }
.fresh.fresh-missing { color:var(--error); background:rgba(224,89,78,.13); }
.metagrid { display:grid; grid-template-columns:auto 1fr; gap:6px 12px; font-size:11.5px; align-items:center; }
.metagrid .mk { color:var(--text-mute); } .metagrid .mv { font-family:var(--font-mono); color:var(--text-dim); text-align:right; }

/* health panel */
.health-badge { display:flex; align-items:center; gap:12px; padding:14px; border-radius:9px; margin:12px 14px; }
.health-badge.warn { background:rgba(224,166,78,.1); border:1px solid rgba(224,166,78,.3); }
.health-badge .ring { width:42px; height:42px; flex:0 0 42px; border-radius:50%; display:grid; place-items:center; font-weight:700; }
.health-badge .ht { font-size:14px; font-weight:650; } .health-badge .hd { font-size:11.5px; color:var(--text-dim); }
.issue { display:flex; gap:10px; padding:10px 14px; cursor:pointer; border-bottom:1px solid var(--hairline); }
.issue:hover { background:var(--bg-elev); }
.issue .ibar { width:3px; flex:0 0 3px; border-radius:2px; }
.issue.error .ibar { background:var(--error); } .issue.warn .ibar { background:var(--warn); } .issue.info .ibar { background:var(--info); }
.issue .it { font-size:12.5px; font-weight:600; }
.issue .id { font-size:11px; color:var(--text-dim); margin-top:2px; }
.issue .in { font-family:var(--font-mono); font-size:9.5px; color:var(--text-mute); margin-top:4px; }
.sevpill { font-family:var(--font-mono); font-size:9px; text-transform:uppercase; padding:1px 6px; border-radius:4px; height:fit-content; }
.sevpill.error { color:var(--error); background:rgba(224,89,78,.14); } .sevpill.warn { color:var(--warn); background:rgba(224,166,78,.14); } .sevpill.info { color:var(--info); background:rgba(78,160,214,.14); }

.empty { padding:40px 20px; text-align:center; color:var(--text-mute); font-size:12px; }

/* ===================== Modal / overlay ===================== */
.scrim { position:fixed; inset:0; background:rgba(4,6,9,.62); backdrop-filter:blur(3px); display:grid; place-items:center; z-index:60; }
.modal { background:var(--bg-panel); border:1px solid var(--border-strong); border-radius:12px; box-shadow:0 24px 70px rgba(0,0,0,.55); width:min(560px,92vw); max-height:88vh; display:flex; flex-direction:column; overflow:hidden; }
.modal.wide { width:min(760px,94vw); }
.modal-head { display:flex; align-items:center; gap:10px; padding:15px 18px; border-bottom:1px solid var(--border); }
.modal-head .mt { font-size:14.5px; font-weight:650; } .modal-head .ms { font-size:11.5px; color:var(--text-dim); }
.modal-body { padding:18px; overflow:auto; }
.modal-foot { display:flex; gap:10px; justify-content:flex-end; padding:14px 18px; border-top:1px solid var(--border); background:var(--bg-panel-2); }

/* command palette */

<style>/* =========================================================================
   Motion — every default state is VISIBLE; entrances are additive so a
   paused/hidden preview can never leave content invisible.
   ========================================================================= */

/* ---- micro-interactions (transition existing visible state) ---- */
.btn, .iconbtn, .crawlbtn, .lstab, .frow, .issue, .cmdk-item, .ntrow .nth,
.insp-mode .tab, .seg button, .nt-seg button, .canvas-ctl button, .tab,
.envrow2, .freshbadge, .sdot, .mm-node {
  transition: background .15s ease, border-color .15s ease, color .15s ease,
              box-shadow .18s ease, transform .14s cubic-bezier(.3,.7,.3,1);
}
.btn:active, .iconbtn:active, .canvas-ctl button:active { transform: translateY(1px) scale(.98); }
.crawlbtn:active:not(:disabled) { transform: translateY(1px); }
.frow:active { transform: translateX(1px); }
.lstab:active { transform: translateY(.5px); }
.cmdk-item:active { transform: translateX(1px); }

/* nodes: own transition for the assemble-in. .entering uses transform ONLY
   (never opacity) so a paused/hidden compositor can't hide a node — worst
   case it sits 8px low for a frame. */
.node {
  transition: transform .42s cubic-bezier(.2,.7,.3,1),
              box-shadow .18s ease, border-color .15s ease, background .15s ease;
}
.node.entering { transform: translateY(9px) scale(.97); }

/* base edge fades calmly so the flow reads on top */
.edge { transition: opacity .25s ease, stroke-width .2s ease; }

@keyframes edgeflow   { to { stroke-dashoffset:-15; } }
@keyframes logIn      { from { transform: translateX(-7px); } }   /* no opacity → safe */
@keyframes fadeUp     { from { opacity:0; transform: translateY(8px); } }
@keyframes fadeIn     { from { opacity:0; } }
@keyframes connpulse  { 0%,100% { box-shadow:0 0 0 0 rgba(78,196,110,.5); } 70% { box-shadow:0 0 0 5px rgba(78,196,110,0); } }
@keyframes ringbreathe{ 0%,100% { box-shadow:0 0 0 0 rgba(224,166,78,0); } 50% { box-shadow:0 0 0 5px rgba(224,166,78,.16); } }
@keyframes spin       { to { transform: rotate(360deg); } }

@media (prefers-reduced-motion: no-preference) {

  /* HERO: data flowing along the wires (output → input) */
  .edge-flow {
    fill:none; stroke-width:2.4; stroke-linecap:round;
    stroke-dasharray:1 14; opacity:.5;
    animation: edgeflow 1.5s linear infinite;
  }
  .edge-flow.dim { opacity:.14; animation-duration:2.8s; }
  .edge-flow.hot { opacity:.95; stroke-width:3; stroke-dasharray:1 11; animation-duration:.7s; }

  /* node lift on hover — shadow/border only (transform reserved for entrance) */
  .node:not(.sel):not(.entering):hover { box-shadow:0 5px 16px rgba(0,0,0,.42); border-color: var(--border-strong); }

  /* live connection dot breathes; needs-attention ring breathes */
  .conn.live .dot { animation: connpulse 2.4s ease-in-out infinite; }
  .health-badge .ring { animation: ringbreathe 2.6s ease-in-out infinite; }

  /* crawl run-icon winds on hover */
  .crawlbtn:hover:not(:disabled) .cbrun { transform: rotate(-90deg); transition: transform .3s ease; }

  /* crawl log lines slide in (transform only — text stays visible if paused) */
  .runlog .ll { animation: logIn .24s ease; }

  /* user-triggered surfaces (always shown while the tab is visible) */
  .scrim { animation: fadeIn .16s ease; }
  .cmdk, .modal { animation: fadeUp .2s cubic-bezier(.2,.7,.3,1); }
  .run-result { animation: fadeUp .3s cubic-bezier(.2,.7,.3,1); }
  .toast { animation: fadeUp .28s cubic-bezier(.2,.7,.3,1); }
  .banner { animation: fadeUp .26s ease; }
}

/* reduced motion: no flowing wires, no loops */
@media (prefers-reduced-motion: reduce) {
  .edge-flow { display:none; }
}
</style>
