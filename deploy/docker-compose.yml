# deploy/docker-compose.yml — team-mode viewer behind your reverse proxy.
#
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# Pair it with Caddy (Caddyfile) or nginx (nginx.conf) for HTTPS, and set
# COOKIE_SECURE=1 once TLS terminates in front. Without a proxy, keep this
# on a trusted LAN only — the auth cookie travels in plaintext over http.

services:
  ue-mat-viewer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    ports:
      - "5790:5790"
    environment:
      BIND_HOST: 0.0.0.0
      # COOKIE_SECURE: "1"   # enable when serving behind HTTPS
    volumes:
      # Shared team workspace: every member sees the same graphs.
      - graphs:/app/graphs
      # Team accounts + tokens (scrypt/sha256 hashes only — still private).
      - auth:/app/viewer/.auth
      # Agent sessions / undo checkpoints / session memory.
      - agent-sessions:/app/viewer/.agent-sessions
      - agent-checkpoints:/app/viewer/.agent-checkpoints
      - agent-memory:/app/viewer/.agent-memory
      # local.config.json (UE paths + the server-held LLM key).
      - toolcfg:/app/tools/node-t3d-metadata
      # Optional: a work-MF index generated on a UE workstation, copied in so
      # the team viewer can resolve project Material Functions. UE crawls
      # cannot run inside the container.
      # - ./workmf-index.json:/app/agent-pack/workmf-index.json

volumes:
  graphs:
  auth:
  agent-sessions:
  agent-checkpoints:
  agent-memory:
  toolcfg:
