# deploy/nginx.conf — HTTPS reverse proxy for the team-mode viewer.
# Drop into /etc/nginx/conf.d/ (adjust certificate paths). The WebSocket
# upgrade headers are required — the viewer streams everything over one WS.
# Remember to start the viewer with COOKIE_SECURE=1.

server {
    listen 443 ssl;
    server_name mat.example.com;

    ssl_certificate     /etc/letsencrypt/live/mat.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mat.example.com/privkey.pem;

    server_tokens off;
    # Security headers (mirror deploy/Caddyfile). `always` so they ride error
    # responses too. CSP allows Vite's inline bundle + the same-origin WebSocket.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; frame-ancestors 'none'" always;

    location / {
        proxy_pass http://127.0.0.1:5790;
        proxy_http_version 1.1;
        # WebSocket upgrade (live graph sync) + SSE (agent chat stream).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_buffering off;          # SSE: flush agent chat events immediately
        proxy_read_timeout 1h;        # long agent turns / idle WS
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name mat.example.com;
    return 301 https://$host$request_uri;
}
