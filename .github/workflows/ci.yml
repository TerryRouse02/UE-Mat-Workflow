name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Cancel superseded runs on the same ref so a fast follow-up push doesn't queue.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          # pnpm 11.3.0 (pinned via packageManager) needs Node >= 22.13 (it
          # uses node:sqlite). Node 20 fails with ERR_UNKNOWN_BUILTIN_MODULE.
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (tsc + vite)
        run: pnpm build

      - name: Test (vitest, all workspaces)
        run: pnpm -r test

      # The following checks run fully offline against committed artifacts —
      # no Unreal Engine needed (the commandlet that *generates* them does).
      - name: Audit export metadata
        run: node tools/node-t3d-metadata/audit-export-meta.js

      - name: Validate tooling layout
        run: node tools/node-t3d-metadata/validate-tooling.js

      - name: Validate plugin source layout
        run: node tools/node-t3d-metadata/plugin-src/validate-plugin.js

      - name: Test Node tooling
        # Glob (not a bare dir): Node 24 treats a bare directory as a module
        # entry point and exits 1; the quoted glob is expanded by Node's test
        # runner and works on Node 20–24. Quote it so the shell doesn't expand it.
        run: node --test "tools/node-t3d-metadata/tests/**/*.test.js"
