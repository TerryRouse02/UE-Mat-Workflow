name: Deploy image

# Build the team-mode container and publish it to GHCR. Runs ONLY after the CI
# workflow succeeds on main (so a red test never ships an image), plus a manual
# trigger. The VPS pulls the published image — it never builds from source.
#
# Tags pushed:
#   :latest          — moving pointer the VPS follows by default
#   :sha-<short>     — immutable, for pinning / instant rollback
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-image
  cancel-in-progress: false

jobs:
  build-push:
    # Publish on a successful CI run, or on a manual dispatch.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve the commit to build
        id: ref
        run: echo "sha=${{ github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.sha }}

      - name: Compute image name (lowercased) + short sha
        id: meta
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:sha-${{ steps.meta.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "### Published image"
            echo ""
            echo '`'"${{ steps.meta.outputs.image }}:sha-${{ steps.meta.outputs.short }}"'`'
            echo ""
            echo "On the VPS: \`./deploy/update.sh\` (or pin: \`IMAGE_TAG=sha-${{ steps.meta.outputs.short }} ./deploy/update.sh\`)"
          } >> "$GITHUB_STEP_SUMMARY"
